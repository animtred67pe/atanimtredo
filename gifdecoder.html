<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Gif Decoder - EAAQ HTMLs</title>
		<style>
			body{
				margin: 0;
				overflow: hidden;
				font-family: monospace;
				color: #fff;
			}
			a{
				cursor: pointer;
				text-decoration: underline;
			}
			.hfgfhh2{
				position: absolute;
				background-color: #111;
				margin: 0;
				padding: 0;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
			}
			#dropdown {
				float: right;
				display: inline-block;
				position: relative;
			}
			#dropdown > select {
				position: absolute;
				font: inherit;
				opacity: 0;
				cursor: pointer;
				top: 0px;
				left: 0px;
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body id="drop_zone" ondrop="dropHandler(event);" ondragover="dragOverHandler(event);">
		<div class="hfgfhh2">
			<div id="atgif" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
			<div style="padding: 5px 6px; position: absolute; top: 5px; left: 5px;">
				<a id="loadmidifile">Open .gif</a>
				<label id="midifiletitle"></label>
				<br>
				<label id="midifilesl"></label>
			</div>
		</div>
		<script>
			// Gif Decoder create on 20/1/2024
			// 4/3/2025
			window.ATGifPlayer = (function() {
				var GifReader = function(buf) {
					var p = 0;
					if (buf[p++] !== 71 || buf[p++] !== 73 || buf[p++] !== 70 || buf[p++] !== 56 || (buf[p++] + 1 & 253) !== 56 || buf[p++] !== 97) {
						throw "Invalid GIF 87a/89a header.";
					}
					var width = buf[p++] | buf[p++] << 8;
					var height = buf[p++] | buf[p++] << 8;
					var pf0 = buf[p++];
					var global_palette_flag = pf0 >> 7;
					var num_global_colors_pow2 = pf0 & 7;
					var num_global_colors = 1 << num_global_colors_pow2 + 1;
					var background = buf[p++];
					p++;
					var global_palette_offset = null;
					if (global_palette_flag) {
						global_palette_offset = p;
						p += num_global_colors * 3;
					}
					var no_eof = true;
					var frames = [];
					var delay = 0;
					var transparent_index = null;
					var disposal = 0;
					var loop_count = null;
					this.width = width;
					this.height = height;
					while (no_eof && p < buf.length) {
						switch (buf[p++]) {
							case 33:
								switch (buf[p++]) {
									case 255:
										if (buf[p] !== 11 || buf[p + 1] == 78 && buf[p + 2] == 69 && buf[p + 3] == 84 && buf[p + 4] == 83 && buf[p + 5] == 67 && buf[p + 6] == 65 && buf[p + 7] == 80 && buf[p + 8] == 69 && buf[p + 9] == 50 && buf[p + 10] == 46 && buf[p + 11] == 48 && buf[p + 12] == 3 && buf[p + 13] == 1 && buf[p + 16] == 0) {
											p += 14;
											loop_count = buf[p++] | buf[p++] << 8;
											p++;
										} else {
											p += 12;
											while (true) {
												var block_size = buf[p++];
												if (block_size === 0)
													break;
												p += block_size;
											}
										}
										break;
									case 249:
										if (buf[p++] !== 4 || buf[p + 4] !== 0)
											throw "Invalid graphics extension block.";
										var pf1 = buf[p++];
										delay = buf[p++] | buf[p++] << 8;
										transparent_index = buf[p++];
										if ((pf1 & 1) === 0)
											transparent_index = null;
										disposal = pf1 >> 2 & 7;
										p++;
										break;
									case 254:
										while (true) {
											var block_size = buf[p++];
											if (block_size === 0)
												break;
											p += block_size;
										}
										break;
									default:
										throw "Unknown graphic control label: 0x" + buf[p - 1].toString(16)
								}
								break;
							case 44:
								var x = buf[p++] | buf[p++] << 8;
								var y = buf[p++] | buf[p++] << 8;
								var w = buf[p++] | buf[p++] << 8;
								var h = buf[p++] | buf[p++] << 8;
								var pf2 = buf[p++];
								var local_palette_flag = pf2 >> 7;
								var interlace_flag = pf2 >> 6 & 1;
								var num_local_colors_pow2 = pf2 & 7;
								var num_local_colors = 1 << num_local_colors_pow2 + 1;
								var palette_offset = global_palette_offset;
								var has_local_palette = false;
								if (local_palette_flag) {
									var has_local_palette = true;
									palette_offset = p;
									p += num_local_colors * 3;
								}
								var data_offset = p;
								p++;
								while (true) {
									var block_size = buf[p++];
									if (block_size === 0)
										break;
									p += block_size;
								}
								frames.push({
									x: x,
									y: y,
									width: w,
									height: h,
									has_local_palette: has_local_palette,
									palette_offset: palette_offset,
									data_offset: data_offset,
									data_length: p - data_offset,
									transparent_index: transparent_index,
									interlaced: !!interlace_flag,
									delay: delay,
									disposal: disposal
								});
								break;
							case 59:
								no_eof = false;
								break;
							default:
								throw "Unknown gif block: " + buf[p - 1];
								break;
						}
					}
					this.numFrames = function() {
						return frames.length
					}
					this.loopCount = function() {
						return loop_count
					}
					this.frameInfo = function(frame_num) {
						if (frame_num < 0 || frame_num >= frames.length)
							throw "Frame index out of range.";
						return frames[frame_num]
					}
					this.decodeAndBlitFrameRGBA = function(frame_num, pixels) {
						var frame = this.frameInfo(frame_num);
						var num_pixels = frame.width * frame.height;
						var index_stream = new Uint8Array(num_pixels);
						GifReaderLZWOutputIndexStream(buf, frame.data_offset, index_stream, num_pixels);
						var palette_offset = frame.palette_offset;
						var trans = frame.transparent_index;
						if (trans === null)
							trans = 256;
						var framewidth = frame.width;
						var framestride = width - framewidth;
						var xleft = framewidth;
						var opbeg = (frame.y * width + frame.x) * 4;
						var opend = ((frame.y + frame.height) * width + frame.x) * 4;
						var op = opbeg;
						var scanstride = framestride * 4;
						if (frame.interlaced === true) {
							scanstride += width * 4 * 7;
						}
						var interlaceskip = 8;
						for (var i = 0, il = index_stream.length; i < il; ++i) {
							var index = index_stream[i];
							if (xleft === 0) {
								op += scanstride;
								xleft = framewidth;
								if (op >= opend) {
									scanstride = framestride * 4 + width * 4 * (interlaceskip - 1);
									op = opbeg + (framewidth + framestride) * (interlaceskip << 1);
									interlaceskip >>= 1;
								}
							}
							if (index === trans) {
								op += 4;
							} else {
								var r = buf[palette_offset + index * 3];
								var g = buf[palette_offset + index * 3 + 1];
								var b = buf[palette_offset + index * 3 + 2];
								pixels[op++] = r;
								pixels[op++] = g;
								pixels[op++] = b;
								pixels[op++] = 255;
							}
							--xleft;
						}
					}
				}
				function GifReaderLZWOutputIndexStream(code_stream, p, output, output_length) {
					var min_code_size = code_stream[p++];
					var clear_code = 1 << min_code_size;
					var eoi_code = clear_code + 1;
					var next_code = eoi_code + 1;
					var cur_code_size = min_code_size + 1;
					var code_mask = (1 << cur_code_size) - 1;
					var cur_shift = 0;
					var cur = 0;
					var op = 0;
					var subblock_size = code_stream[p++];
					var code_table = new Int32Array(4096);
					var prev_code = null;
					while (true) {
						while (cur_shift < 16) {
							if (subblock_size === 0)
								break;
							cur |= code_stream[p++] << cur_shift;
							cur_shift += 8;
							if (subblock_size === 1) {
								subblock_size = code_stream[p++];
							} else {
								subblock_size--;
							}
						}
						if (cur_shift < cur_code_size)
							break;
						var code = cur & code_mask;
						cur >>= cur_code_size;
						cur_shift -= cur_code_size;
						if (code === clear_code) {
							next_code = eoi_code + 1;
							cur_code_size = min_code_size + 1;
							code_mask = (1 << cur_code_size) - 1;
							prev_code = null;
							continue;
						} else if (code === eoi_code) {
							break;
						}
						var chase_code = code < next_code ? code : prev_code;
						var chase_length = 0;
						var chase = chase_code;
						while (chase > clear_code) {
							chase = code_table[chase] >> 8;
							++chase_length;
						}
						var k = chase;
						var op_end = op + chase_length + (chase_code !== code ? 1 : 0);
						if (op_end > output_length) {
							console.log("Warning, gif stream longer than expected.");
							return;
						}
						output[op++] = k;
						op += chase_length;
						var b = op;
						if (chase_code !== code)
							output[op++] = k;
						chase = chase_code;
						while (chase_length--) {
							chase = code_table[chase];
							output[--b] = chase & 255;
							chase >>= 8;
						}
						if (prev_code !== null && next_code < 4096) {
							code_table[next_code++] = prev_code << 8 | k;
							if (next_code >= code_mask + 1 && cur_code_size < 12) {
								++cur_code_size;
								code_mask = code_mask << 1 | 1;
							}
						}
						prev_code = code;
					}
					if (op !== output_length) {
						console.log("Warning, gif stream shorter than expected.");
					}
					return output;
				}
				function array_fill(arr, value) {
					for (var i = 0; i < arr.length; i++) {
						arr[i] = value;
					}
				}
				var Player = function() {
					this.canvas = document.createElement("canvas");
					this.canvas.width = 100;
					this.canvas.height = 100;
					this.ctx = this.canvas.getContext("2d");
					this.imageData = null;
					this.lastImageData = null;
					this.time = 0;
					this.timeOffest = 0;
					this.startOffest = 0;
					this.frameId = 0;
					this.onframe = null;
					this._duration = 0;
					setInterval(this.tick.bind(this), 10);
				}
				Player.prototype.getTime = function() {
					return (this.time - this.startOffest) / 1000;
				}
				Player.prototype.getDelay = function(frame_id) {
					if (!this.reader) return 0;
					var delay = this.reader.frameInfo(frame_id).delay;
					if (delay > 1) {
						return delay * 10;
					} else {
						return 100;
					}
				}
				Player.prototype.getDuration = function() {
					return this._duration;
				}
				Player.prototype.getCurrentFrameId = function() {
					return this.frameId;
				}
				Player.prototype.getLengthFrames = function() {
					return this.reader ? this.reader.numFrames() : 0;
				}
				Player.prototype.tick = function() {
					if (this.reader) {
						if ((this.time - this.startOffest) >= this.timeOffest) {
							if (this.frameId >= this.reader.numFrames()) {
								this.frameId = 0;
								this.timeOffest = 0;
								this.startOffest = this.time;
								array_fill(this.imageData.data, 0);
							}
							this.putRender();
							this.frameId++;
						}
					} else {
						this.startOffest = this.time;
					}
					this.time += 10;
				};
				Player.prototype.putRender = function() {
					var frameInfo = this.reader.frameInfo(this.frameId);
					this.timeOffest += this.getDelay(this.frameId);
					var imageData = this.imageData;
					this.ctx.clearRect(0, 0, imageData.width, imageData.height);
					if (this.frameId > 0) {
						var lastFrameInfo = this.reader.frameInfo(this.frameId - 1);
						if (lastFrameInfo.disposal == 3) {
							imageData.data.set(this.lastImageData.data, 0);
						}
						if (lastFrameInfo.disposal == 2) {
							for (var x = lastFrameInfo.x; x < (lastFrameInfo.x + lastFrameInfo.width); x++) {
								for (var y = lastFrameInfo.y; y < (lastFrameInfo.y + lastFrameInfo.height); y++) {
									var i = (x + (imageData.width * y)) * 4;
									imageData.data[i] = 0;
									imageData.data[i + 1] = 0;
									imageData.data[i + 2] = 0;
									imageData.data[i + 3] = 0;
								}
							}
						}
					}
					if (this.frameId > 0) {
						this.lastImageData.data.set(imageData.data, 0);
					}
					this.reader.decodeAndBlitFrameRGBA(this.frameId, imageData.data);
					this.ctx.putImageData(imageData, 0, 0);
					if (this.onframe)
						this.onframe();
				};
				Player.prototype.loadBuffer = function(arrayBuffer) {
					this.reader = null;
					this.frameId = 0;
					this.timeOffest = 0;
					this.startOffest = this.time;
					this.imageData = null;
					this.lastImageData = null;
					this.canvas.width = 1;
					this.canvas.height = 1;
					this._duration = 0;
					var reader = new GifReader(new Uint8Array(arrayBuffer));
					this.canvas.width = reader.width;
					this.canvas.height = reader.height;
					this.imageData = this.ctx.createImageData(reader.width, reader.height);
					this.lastImageData = this.ctx.createImageData(reader.width, reader.height);
					this.reader = reader;
					var ff = 0;
					for (var i = 0; i < reader.numFrames(); i++) 
						ff += this.getDelay(i);
					this._duration = ff;
				};
				return Player;
			}());
		</script>
		<script>
			(function() {
				function getDuraction(num) {
					var txt = '';
					var _ms = Math.floor(num);
					var _mm = Math.floor(num / 60);
				
					var ms = _ms % 60;
					var mm = _mm % 60;
					var mh = Math.floor(num / 3600);
					if (_mm >= 60) {
						txt += '' + mh;
						txt += ':';
					}
					if ((mm >= 10) || (_ms < 600)) {
						txt += '' + mm;
					} else {
						txt += '0' + mm;
					}
					txt += ':';
					if (ms >= 10) {
						txt += '' + ms;
					} else {
						txt += '0' + ms;
					}
					return txt;
				}
				var atgif = document.getElementById('atgif');
				var midifiletitle = document.getElementById('midifiletitle');
				var midifilesl = document.getElementById('midifilesl');

				var player = new ATGifPlayer();

				var gifData = null;

				atgif.appendChild(player.canvas);

				var gids = [];
				var gidslen = 0;
				atgif.style.display = 'none';
				var rrr = null;
				atgif.onclick = function (e) {
					gidslen++;
					if (gidslen >= gids.length) gidslen = 0;
					loadMidiFile(gids[gidslen]);
				}
				atgif.oncontextmenu = function (e) {
					if (gifData) {
						e.preventDefault();
						var zipblob = new Blob([gifData]);
						var a = document.createElement("a");
						a.href = URL.createObjectURL(zipblob);
						a.download = "AT_GIF_MD5.gif";
						a.click();
					}
				}
				player.onframe = function() {
					midifilesl.textContent = "Time: " + getDuraction(player.getTime()) + " / " + getDuraction(player.getDuration() / 1000) +  " Frames: " + ((player.getCurrentFrameId() % player.getLengthFrames()) + 1) + "/" + player.getLengthFrames();
				}
				function loadMidiFile(file) {
					var a = new FileReader();
					a.onload = (function(e) {
						setTimeout(function () {
							player.loadBuffer(e.target.result);
							midifiletitle.textContent = file.name;
							atgif.style.display = '';
							midifilesl.textContent = "";
						}, 2);
					}).bind(this);
					a.readAsArrayBuffer(file);
				}
				function addMidiFile(file) {
					gids.push(file);
				}
				function dropHandler(ev) {
					ev.preventDefault();
					var items = ev.dataTransfer.items;
					var item = items[0];
					if (item) {
						if (item.kind === 'file') {
							var file = item.getAsFile();
							loadMidiFile(file);
						}
					}
				}
				function dragOverHandler(ev) {
					ev.preventDefault();
				}
				var loadmidifile = document.getElementById('loadmidifile');
				loadmidifile.onclick = function () {
					var sa = document.createElement('input');
					sa.type = 'file';
					sa.accept = '.gif';
					sa.multiple = true;
					sa.addEventListener('change', function (e) {
						gifData = null;
						gids = [];
						gidslen = 0;
						for (var i = 0; i < e.target.files.length; i++) {
							addMidiFile(e.target.files[i]);
						}
						gidslen = 0;
						loadMidiFile(gids[gidslen]);
					}, false);
					sa.click();
				}
			}());
		</script>
	</body>
</html>
