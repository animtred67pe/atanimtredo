                        } else if (document.webkitCancelFullScreen) {
                            document.webkitCancelFullScreen();
                        } else if (document.webkitExitFullscreen) {
                            document.webkitExitFullscreen();
                        }
                    }
                    __resize_();
                    sle = false;
                }
            }

            document.addEventListener('fullscreenchange', function() {_fullscreenchange()});
            document.addEventListener('mozfullscreenchange', function() {_fullscreenchange()});
            document.addEventListener('webkitfullscreenchange', function() {_fullscreenchange()});

            function gbfullscreenbtn() {
                if (sle) {
                    closedemo();
                } else {
                    opendemo();
                }
            }

            function gbjoykb(control, iskeydown) {
                if (control == "down") {
                    gbc.Input[0] = iskeydown ? 0 : 1;
                }
                if (control == "up") {
                    gbc.Input[1] = iskeydown ? 0 : 1;
                }
                if (control == "left") {
                    gbc.Input[2] = iskeydown ? 0 : 1;
                }
                if (control == "right") {
                    gbc.Input[3] = iskeydown ? 0 : 1;
                }
                if (control == "start") {
                    gbc.Input[4] = iskeydown ? 0 : 1;
                }
                if (control == "select") {
                    gbc.Input[5] = iskeydown ? 0 : 1;
                }
                if (control == "B") {
                    gbc.Input[6] = iskeydown ? 0 : 1;
                }
                if (control == "A") {
                    gbc.Input[7] = iskeydown ? 0 : 1;
                }
            }

            if (AT_MobileKB.isMobileOrTablet()) {
                var atmkb = new AT_MobileKB(0, gdfdfgdfgdg_atmkb);
                atmkb.callback = function(control, mousedown) {
                    if (control == "gbc_js") {
                        if (mousedown) {
                            gbmenubtn();
                        }
                    } else {
                        gbjoykb(control, mousedown);
                    }
                }    
            }

            window.addEventListener("keydown", function(e) {
                if (e.keyCode == 70) {
                    gbfullscreenbtn();
                }
                if (e.keyCode == 78) {
                    if (wavescene.style.display == "none") {
                        wavescene.style.display = "";
                    } else {
                        wavescene.style.display = "none";
                    }
                }
                if (e.keyCode == 84) {
                    gbc.turbo = true;
                }
                if (e.keyCode == 57) {
                    gbc.ROM = [];
                }
                if (e.keyCode == 56) {
                    gbc.Flags = new Uint8Array(0);
                }
                if (e.keyCode == 81) {
                    GB_STATE = gbc.saveState();
                }
                if (e.keyCode == 87) {
                    if (GB_STATE) {
                        gbc.Flags = [];
                        gbc.loadState(GB_STATE);
                    }
                }
                if (e.keyCode == 80) {
                    gdfgdg_playpause();
                }
                if (menu_gb.style.display == "none") {
                    if (e.keyCode == 82) {
                        gdfgdg_reset();
                    }
                    if (e.keyCode == 40) {
                        gbc.Input[0] = 0;
                    }
                    if (e.keyCode == 38) {
                        gbc.Input[1] = 0;
                    }
                    if (e.keyCode == 37) {
                        gbc.Input[2] = 0;
                    }
                    if (e.keyCode == 39) {
                        gbc.Input[3] = 0;
                    }
                    if (e.keyCode == 32) {
                        gbc.Input[4] = 0;
                    }
                    if (e.keyCode == 67) {
                        gbc.Input[5] = 0;
                    }
                    if (e.keyCode == 88) {
                        gbc.Input[6] = 0;
                    }
                    if (e.keyCode == 90) {
                        gbc.Input[7] = 0;
                    }
                }
            });
            window.addEventListener("keyup", function(e) {
                if (e.keyCode == 84) {
                    gbc.turbo = false;
                }
                if (e.keyCode == 40) {
                    gbc.Input[0] = 1;
                }
                if (e.keyCode == 38) {
                    gbc.Input[1] = 1;
                }
                if (e.keyCode == 37) {
                    gbc.Input[2] = 1;
                }
                if (e.keyCode == 39) {
                    gbc.Input[3] = 1;
                }
                if (e.keyCode == 32) {
                    gbc.Input[4] = 1;
                }
                if (e.keyCode == 67) {
                    gbc.Input[5] = 1;
                }
                if (e.keyCode == 88) {
                    gbc.Input[6] = 1;
                }
                if (e.keyCode == 90) {
                    gbc.Input[7] = 1;
                }
            });

            var playedSound = false;

            function gfhfhfh(H, type) {
                var S = [];
                if (type == 4) {
                    for (var i = 0; i < H; i++) {
                        S.push((i > (H / 4)) ? -0.5 : 0.5);
                    }
                } else if (type == 3) {
                    for (var i = 0; i < H; i++) {
                        S.push((i > (H / 4)) ? 0.5 : -0.5);
                    }
                } else {
                    if (type == 2) {
                       for (var i = 0; i < H; i++) {
                            S.push((i > (H / 8)) ? 0.5 : -0.5);
                        }
                    } else {
                        if (type == 1) {
                            for (var i = 0; i < H; i++) {
                                S.push((i > (H / 2)) ? 0.5 : -0.5);
                            }
                        } else {
                            for (var i = 0; i < H; i++) {
                                S.push((i - (H / 2)) / (H / 2));
                            }
                        }
                    }
                }
                return S;
            }

            var channelPitch = [0, 0, 0, 0];
            var channelI = [0, 0, 0, 0];
            var channelLeftVolume = [0, 0, 0, 0];
            var channelRightVolume = [0, 0, 0, 0];
            var channelS = [[0], [0], gfhfhfh(32, 0), [0]];

            var channelDutyCycle = [0, 0];

            var wavDutyCycle = [gfhfhfh(100, 2), gfhfhfh(100, 3), gfhfhfh(100, 1), gfhfhfh(100, 4)];

            var WaveNoise1 = [];
            var WaveNoise2 = [];

            var randomFactor = 1;
            var LSFR = 0x7FFF;
            var LSFRShifted = 0x3FFF;
            for (var index = 0; index < 0x8000; ++index) {
                randomFactor = 1 - (LSFR & 1);
                WaveNoise1.push(randomFactor - 0.5);
                LSFRShifted = LSFR >> 1;
                LSFR = LSFRShifted | (((LSFRShifted ^ LSFR) & 0x1) << 14);
            }
            LSFR = 0x7F;
            for (index = 0; index < 0x80; ++index) {
                randomFactor = 1 - (LSFR & 1);
                WaveNoise2.push(randomFactor - 0.5);
                LSFRShifted = LSFR >> 1;
                LSFR = LSFRShifted | (((LSFRShifted ^ LSFR) & 0x1) << 6);
            }

            channelS[0] = wavDutyCycle[0];
            channelS[1] = wavDutyCycle[0];

            var audioRunning = true;
            var channelWav = [new Float32Array(1024), new Float32Array(1024), new Float32Array(1024), new Float32Array(1024)];
            var outLen = 1024;
            var outputLeft = new Float32Array(outLen);
            var outputRight = new Float32Array(outLen);

            var fgdgfdg = 0;
            var sampleIndex = 2048;

            function smindex() {
                var ospeed = 44100 / audioContext.sampleRate;
                for (var i = 0; i < 1024; i++) {
                    var sampleLeft = 0;
                    var sampleRight = 0;
                    if (audioRunning) {
                        var gd = sampleIndex % 1024;
                        channelWav[0][gd] = 0;
                        channelWav[1][gd] = 0;
                        channelWav[2][gd] = 0;
                        channelWav[3][gd] = 0;
                        for (var ch = 0; ch < 4; ch++) {
                            var ch_left = channelLeftVolume[ch];
                            var ch_right = channelRightVolume[ch];
                            var SquareWave = channelS[ch];
                            var iwav = channelI[ch];
                            if ((ch_left + ch_right) > 0) {
                                iwav += ospeed * channelPitch[ch];
                                iwav = iwav % SquareWave.length;
                                var res = SquareWave[(iwav % SquareWave.length) | 0] || 0;
                                var rg = (gd - 512) * (ospeed * channelPitch[ch]);
                                rg = (rg - (SquareWave.length / 2)) % SquareWave.length;
                                if (rg < 0) rg += SquareWave.length;
                                var res2 = SquareWave[rg | 0] || 0;
                                channelWav[ch][gd] += (res2 * ch_left) + (res2 * ch_right) / 2;
                                sampleLeft += res * ch_left;
                                sampleRight += res * ch_right;
                            } else {
                                iwav = 0;
                            }
                            channelI[ch] = iwav;
                        }   
                    }
                    outputLeft[sampleIndex % outLen] = sampleLeft;
                    outputRight[sampleIndex % outLen] = sampleRight;
                    sampleIndex++;
                }
            }

            function writeSampleData(evt) {
                smindex();
                var output1 = evt.outputBuffer.getChannelData(0);
                var output2 = evt.outputBuffer.getChannelData(1);
                for (var i = 0; i < 1024; i++) {
                    if (audioRunning) {
                        output1[i] = outputLeft[fgdgfdg % outLen];
                        output2[i] = outputRight[fgdgfdg % outLen];
                    } else {
                        output1[i] = 0;
                        output2[i] = 0;
                    }
                    fgdgfdg++;
                }
            }

            var audioContext = new AudioContext();

            var source = audioContext.createScriptProcessor(1024, 2, 2);
            source.onaudioprocess = writeSampleData;
            source.connect(audioContext.destination);

            function loadGBFile(f) {
                gbctitle.textContent = f.name || "";
                var reader = new FileReader();
                reader.onload = function (e) {
                    var data = new Uint8Array(e.target.result);
                    gbLoadRom(data);
                };
                reader.readAsArrayBuffer(f);
            }

            function gbopenrom() {
                var sa = document.createElement('input');
                sa.type = 'file';
                sa.accept = '.gb, .gbc';
                sa.addEventListener('change', function (e) {
                    var file = e.target.files[0];
                    if (!file) {
                        return;
                    }
                    loadGBFile(file);
                }, false);
                sa.click();
            }

            function dropHandler(ev) {
                ev.preventDefault();
                if (ev.dataTransfer.items) {
                    var item = ev.dataTransfer.items[0];
                    if (item) {
                        if (item.kind === 'file') {
                            var file = item.getAsFile();
                            loadGBFile(file);
                        }
                    };
                }
            }
            function dragOverHandler(ev) {
                ev.preventDefault();
            }
            window.addEventListener("drop", dropHandler);
            window.addEventListener("dragover", dragOverHandler);

            function playSound() {
                if (audioContext.state == "running") {
                    if (!playedSound) {
                        var _source = audioContext.createBufferSource();
                        _source.connect(source);
                        _source.start();
                        playedSound = true;    
                    }
                } else {
                    audioContext.resume();
                }
            }

            function gbSetPaused(p) {
                gbPaused = p;
                if (gbPaused) {
                    menu_gb.style.display = "";
                    playerArea.style.opacity = 0.33;
                } else {
                    menu_gb.style.display = "none";
                    playerArea.style.opacity = 1;
                }
            }
            
            function gdfgdg_playpause() {
                gbSetPaused(!gbPaused);
            }

            function drawWaveChannel() {
                var glen = wavescene.height / 4;
                ctx.clearRect(0, 0, wavescene.width, wavescene.height);
                ctx.beginPath();
                for (var ch = 0; ch < 4; ch++) {
                    ctx.moveTo(0, (glen / 2) + (ch * glen));
                    for (var i = 0; i < 256; i++) {
                        var wavsample = channelWav[ch][((i / 256) * 1024) | 0] || 0;
                        ctx.lineTo((i / 256) * wavescene.width, ((wavsample * (glen / 2)) + (glen / 2)) + (ch * glen));
                    }
                }
                ctx.strokeStyle = "#fff";
                ctx.stroke();
            }

            function stepAudio() {
                var c2data = channelS[2];
                for (var i = 0; i < 32; i++) {
                    c2data[i] = (gbc.WaveTable[i] - 8) / 16;
                }
                if ((gbc.NoiseChannelWidthMode & 1) == 1) {
                    channelS[3] = WaveNoise2;
                } else {
                    channelS[3] = WaveNoise1;
                }
                for (var ch = 0; ch < 4; ch++) {
                    var volume = (gbc.AudioEngine[(ch * 9) + 6] / 100) * gbc.AudioEngineEnables[ch];
                    if (volume > 1) volume = 1;
                    volume /= 4;
                    if (ch < 2) {
                        if (channelDutyCycle[ch] != gbc.AudioEngineDutyCycle[ch]) {
                            channelS[ch] = wavDutyCycle[gbc.AudioEngineDutyCycle[ch] % 4];
                            channelDutyCycle[ch] = gbc.AudioEngineDutyCycle[ch];
                        }
                    }
                    var freq = gbc.AudioEngine[(ch * 9) + 7];
                    if (freq > 0) {
                        if (ch == 3) {
                            channelPitch[ch] = freq / 5440;
                        } else {
                            if (ch == 2) {
                                channelPitch[ch] = (freq * 0.32) / 880;
                            } else {
                                channelPitch[ch] = freq / 440;
                            }
                        }    
                    }
                    channelLeftVolume[ch] = gbc.AudioEngineStereoLeft[ch] * volume;
                    channelRightVolume[ch] = gbc.AudioEngineStereoRight[ch] * volume;
                }
                if (wavescene.style.display != "none") {
                    drawWaveChannel();
                }
            }

            var gbrunstate = 0;

            setInterval(function() { 
                if (!gbPaused && (!document.hidden && !document.msHidden && !document.mozHidden && !document.webkitHidden)) {
                    audioRunning = true;
                    if (gbrunstate == 0) {
                        playSound();
                        gbc.run();
                        stepAudio();
                        gbrunstate = 1;
                    } else {
                        gbrunstate = 0;
                    }
                } else {
                    audioRunning = false;
                }
            }, 8);
        </script>
    </body>
